name: 毎朝ニュース更新

on:
  schedule:
    # 毎朝7:30 JST（= UTC 22:30 前日）
    - cron: '30 22 * * *'
  workflow_dispatch:  # 手動実行ボタン

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4

      - name: ニュースを取得
        run: python fetch_news.py

      - name: news.jsonをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "🗞️ $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push
